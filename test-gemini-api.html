<!DOCTYPE html>
<html>
<head>
    <title>Test Gemini API Key</title>
</head>
<body>
    <h1>Test Gemini API Key</h1>
    <button onclick="testAPI()">Test API Key</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            
            try {
                // Test direct Gemini API call
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_API_KEY_HERE' // Replace with actual key
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Hello, can you tell me about the weather?"
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div style="color: green;">✅ API Key Works! Response: ${JSON.stringify(data)}</div>`;
                } else {
                    result.innerHTML = `<div style="color: red;">❌ API Key Failed: ${data.error?.message || 'Unknown error'}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div style="color: red;">❌ Network Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
