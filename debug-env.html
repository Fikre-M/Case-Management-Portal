<!DOCTYPE html>
<html>
<head>
    <title>Debug Environment Variables</title>
</head>
<body>
    <h1>Environment Variables Debug</h1>
    <button onclick="checkEnvVars()">Check Environment Variables</button>
    <div id="result"></div>

    <script>
        function checkEnvVars() {
            const result = document.getElementById('result');
            
            // Check all relevant environment variables
            const envVars = {
                'VITE_AI_ENABLED': import.meta.env.VITE_AI_ENABLED,
                'VITE_USE_MOCK_DATA': import.meta.env.VITE_USE_MOCK_DATA,
                'AidFlow_API_KEY': import.meta.env.AidFlow_API_KEY,
                'VITE_API_BASE_URL': import.meta.env.VITE_API_BASE_URL,
                'VITE_APP_NAME': import.meta.env.VITE_APP_NAME
            };
            
            let html = '<h2>Environment Variables:</h2>';
            for (const [key, value] of Object.entries(envVars)) {
                const displayValue = key.includes('API_KEY') ? 
                    (value ? `${value.substring(0, 10)}...${value.substring(value.length - 5)}` : 'NOT SET') : 
                    value;
                html += `<p><strong>${key}:</strong> ${displayValue}</p>`;
            }
            
            // Test AI service directly
            html += '<h2>AI Service Test:</h2>';
            
            // Check conditions
            const aiEnabled = import.meta.env.VITE_AI_ENABLED !== 'false';
            const useMockData = import.meta.env.VITE_USE_MOCK_DATA === 'true';
            const hasApiKey = import.meta.env.AidFlow_API_KEY && import.meta.env.AidFlow_API_KEY.length > 10;
            
            html += `<p>AI_ENABLED: ${aiEnabled}</p>`;
            html += `<p>USE_MOCK_DATA: ${useMockData}</p>`;
            html += `<p>Has API Key: ${hasApiKey}</p>`;
            html += `<p>Will use real AI: ${aiEnabled && !useMockData && hasApiKey}</p>`;
            
            result.innerHTML = html;
        }
    </script>
</body>
</html>
